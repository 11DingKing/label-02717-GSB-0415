<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音克隆系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .file-input-wrapper {
            position: relative;
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input-wrapper:hover { border-color: #667eea; background: #f8f9ff; }
        .file-input-wrapper.has-file { border-color: #4caf50; background: #e8f5e9; }
        .file-input-wrapper input { position: absolute; opacity: 0; width: 100%; height: 100%; top: 0; left: 0; cursor: pointer; }
        .file-name { margin-top: 10px; color: #666; font-size: 14px; }
        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .result { margin-top: 30px; display: none; }
        .result.show { display: block; }
        .result h3 { color: #333; margin-bottom: 15px; }
        audio { width: 100%; border-radius: 8px; }
        .loading { display: none; text-align: center; margin-top: 20px; }
        .loading.show { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #e53935; margin-top: 15px; text-align: center; display: none; }
        .error.show { display: block; }
        .tip { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ 语音克隆系统</h1>
        <form id="cloneForm">
            <div class="form-group">
                <label>上传参考音频（约10秒）</label>
                <div class="file-input-wrapper" id="dropZone">
                    <input type="file" id="audioFile" accept="audio/*" required>
                    <div>📁 点击或拖拽上传音频文件</div>
                    <div class="file-name" id="fileName"></div>
                </div>
                <div class="tip">支持 WAV、MP3 等格式，建议 10 秒左右的清晰人声</div>
            </div>
            <div class="form-group">
                <label>输入要合成的文本</label>
                <textarea id="textInput" placeholder="Please enter English text here, e.g.: Hello, this is a voice cloning test." required></textarea>
                <div class="tip">⚠️ 仅支持英语、葡萄牙语、法语，不支持中文</div>
            </div>
            <button type="submit" id="submitBtn">生成语音</button>
        </form>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在克隆语音，首次生成可能需要较长时间...</p>
        </div>
        <div class="error" id="error"></div>
        <div class="result" id="result">
            <h3>🔊 生成结果</h3>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>
    <script>
        const form = document.getElementById('cloneForm');
        const audioFile = document.getElementById('audioFile');
        const textInput = document.getElementById('textInput');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const audioPlayer = document.getElementById('audioPlayer');
        const errorDiv = document.getElementById('error');
        const fileName = document.getElementById('fileName');
        const dropZone = document.getElementById('dropZone');

        audioFile.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                fileName.textContent = e.target.files[0].name;
                dropZone.classList.add('has-file');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = audioFile.files[0];
            const text = textInput.value.trim();
            
            if (!file || !text) return;
            
            submitBtn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');
            errorDiv.classList.remove('show');
            
            const formData = new FormData();
            formData.append('audio', file);
            formData.append('text', text);
            
            try {
                const response = await fetch('/api/clone', {
                    method: 'POST',
                    body: formData
                });
                
                const contentType = response.headers.get('content-type') || '';
                
                if (!response.ok) {
                    if (contentType.includes('application/json')) {
                        const err = await response.json();
                        throw new Error(err.error || '生成失败');
                    } else {
                        throw new Error(`服务器错误 (${response.status})，请检查后端服务是否正常运行`);
                    }
                }
                
                if (!contentType.includes('audio/')) {
                    throw new Error('服务器返回了非音频内容，请检查后端服务');
                }
                
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                result.classList.add('show');
            } catch (err) {
                if (err.name === 'TypeError' && err.message.includes('fetch')) {
                    errorDiv.textContent = '错误: 无法连接到服务器，请检查网络或后端服务是否启动';
                } else {
                    errorDiv.textContent = '错误: ' + err.message;
                }
                errorDiv.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                loading.classList.remove('show');
            }
        });
    </script>
</body>
</html>
