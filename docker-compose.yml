services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    expose:
      - "5000"
    volumes:
      - voice_data:/app/data
      - tts_models:/root/.local/share/tts
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: frontend-user
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  voice_data:
  tts_models:
